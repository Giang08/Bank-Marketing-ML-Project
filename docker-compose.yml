version: "3.8"

services:
  # 1. Khởi tạo Database (MySQL)
  db:
    image: mysql:8.0
    container_name: bank_marketing_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bank_marketing_db
    ports:
      - "3306:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  # 2. Khởi tạo API (Backend)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bank_marketing_backend
    ports:
      - "8000:8000"
    depends_on:
      - db

  # 3. Khởi tạo Giao diện (Frontend)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: bank_marketing_frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
